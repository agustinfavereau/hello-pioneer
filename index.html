<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pioneer Notes</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f9f9f7;
        color: #1a1a1a;
        min-height: 100vh;
        padding: 2rem 1rem;
      }

      .container {
        max-width: 640px;
        margin: 0 auto;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 2rem;
        color: #111;
      }

      #note-form {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-bottom: 2.5rem;
      }

      textarea {
        width: 100%;
        min-height: 100px;
        padding: 0.75rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.95rem;
        font-family: inherit;
        resize: vertical;
        background: #fff;
        transition: border-color 0.15s;
      }

      textarea:focus {
        outline: none;
        border-color: #555;
      }

      button[type="submit"] {
        align-self: flex-end;
        padding: 0.5rem 1.25rem;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 0.9rem;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }
      button[type="submit"]:hover:not(:disabled) { opacity: 0.8; }

      #status { font-size: 0.85rem; min-height: 1.2em; }
      #status.error { color: #c0392b; }
      #status.success { color: #27ae60; }

      #notes-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .note {
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 8px;
        padding: 1rem;
      }

      .note strong {
        display: block;
        margin-bottom: 0.25rem;
        font-size: 0.95rem;
      }

      .note p {
        font-size: 0.95rem;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .note-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 0.6rem;
        gap: 0.5rem;
      }

      .note time {
        font-size: 0.75rem;
        color: #999;
      }

      .share-btn {
        background: none;
        border: 1px solid #ddd;
        border-radius: 5px;
        padding: 0.25rem 0.6rem;
        font-size: 0.75rem;
        color: #666;
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 0.15s, color 0.15s;
      }

      .share-btn:hover:not(:disabled) { border-color: #999; color: #1a1a1a; }
      .share-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .loading, .empty, .error {
        font-size: 0.9rem;
        color: #888;
        padding: 1rem 0;
      }

      .error { color: #c0392b; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Pioneer Notes</h1>

      <form id="note-form">
        <textarea id="note-content" placeholder="Write a note…" required></textarea>
        <button type="submit">Post note</button>
        <span id="status"></span>
      </form>

      <ul id="notes-list"></ul>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
